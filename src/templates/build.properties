# NTS build.properties template for a role-specific NTS unit.
#
# Usage:
# - Copy this file to the NTS unit folder, for example:
#   src/<InformationStandard>/<Test|Cert>/build.properties
# - Replace all TODO values before running the NTS build.
# - Paths are relative to the repository root.

input.dir = src/TODO-InformationStandard/TODO-Goal
output.dir = output/TODO-FhirVersion/TODO-InformationStandard/TODO-Usecase/TODO-Goal

informationStandard = TODO Information Standard Version
usecase = TODO Use Case
goal = TODO Goal
serverAlias = TODO nictiz/nictizmedmij
fhir.version = TODO FHIR version

# Comma-separated list of FHIR package canonicals used for profile validation.
# Versions are usually resolved through Configuration/package.version.properties.
packages = TODO.package.canonical

# Optional: exclude fixtures that should not be included in the generated LoadResources script.
# loadresources.exclude = _reference/resources-send-only

# Optional: add build variants. The target name is appended to an existing input folder name.
# Example: Retrieving-System-NoProvenance expects an input folder or target based on Retrieving-System.
# targets.additional = Retrieving-System-NoProvenance
# target.description.Retrieving-System-NoProvenance = Version without _revinclude Provenance query parameters
# targets.adminOnly = Retrieving-System-NoProvenance

# Optional: skip fixture processing when no fixture narrative or JSON conversion steps are needed.
# processfixtures.skip = true
